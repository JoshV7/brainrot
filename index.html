<!DOCTYPE html>

<html lang="en" style="background:#050810!important;color-scheme:dark!important;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Brainrot Amore</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── HARD RESET – no system theme leakage ── */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  color-scheme: dark;
  -webkit-tap-highlight-color: transparent;
}

html {
background: #050810 !important;
height: 100%;
color-scheme: dark;
}

body {
background: #050810 !important;
color: #f1f5f9 !important;
font-family: ‘Outfit’, sans-serif;
height: 100%;
width: 100%;
overflow: hidden;
touch-action: none;
-webkit-text-size-adjust: 100%;
}

/* Force every element dark */
body, div, section, header, main, footer, span, p, h1, h2, h3, button {
background-color: transparent;
color: inherit;
}

/* Grid bg */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
z-index: 0;
}

body::after {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 70% 40% at 50% 0%, rgba(59,130,246,0.15) 0%, transparent 70%),
radial-gradient(ellipse 50% 30% at 50% 100%, rgba(99,102,241,0.08) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}

/* ── APP SHELL ── */
.app {
position: relative;
z-index: 1;
width: 100%;
height: 100%;
max-width: 420px;
margin: 0 auto;
display: flex;
flex-direction: column;
align-items: center;
padding: 0 16px;
background: transparent;
}

/* ── HEADER ── */
header {
flex-shrink: 0;
width: 100%;
text-align: center;
padding: 14px 0 6px;
background: transparent;
}

.logo {
font-family: ‘Bebas Neue’, cursive;
font-size: clamp(1.8rem, 8vw, 2.4rem);
letter-spacing: 5px;
background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 60%, #3b82f6 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
line-height: 1;
}

.sub {
font-size: 0.62rem;
color: #475569;
letter-spacing: 3px;
text-transform: uppercase;
margin-top: 3px;
}

/* ── SCORE ── */
.score-row {
flex-shrink: 0;
display: flex;
gap: 10px;
margin: 8px 0 6px;
}

.score-pill {
display: flex;
align-items: center;
gap: 6px;
padding: 5px 14px;
border-radius: 50px;
font-family: ‘Bebas Neue’, cursive;
font-size: 0.95rem;
letter-spacing: 1.5px;
border: 1px solid;
}

.score-pill.s {
background: rgba(34,197,94,0.12) !important;
border-color: rgba(34,197,94,0.35);
color: #22c55e !important;
}

.score-pill.p {
background: rgba(239,68,68,0.12) !important;
border-color: rgba(239,68,68,0.35);
color: #ef4444 !important;
}

/* ── STACK AREA ── */
.stack-wrap {
flex: 1;
width: 100%;
position: relative;
display: flex;
align-items: center;
justify-content: center;
min-height: 0;
background: transparent;
}

.stack {
position: relative;
width: 100%;
max-width: 360px;
height: min(460px, calc(100vh - 270px));
background: transparent;
}

/* ── CARDS ── */
.card {
position: absolute;
inset: 0;
border-radius: 22px;
overflow: hidden;
background: #0f172a !important;
border: 1px solid rgba(59,130,246,0.22);
box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(59,130,246,0.07);
display: flex;
flex-direction: column;
cursor: grab;
user-select: none;
-webkit-user-select: none;
will-change: transform;
}

.card:active { cursor: grabbing; }

.card.depth-0 { z-index: 3; }
.card.depth-1 {
z-index: 2;
transform: scale(0.94) translateY(14px);
filter: brightness(0.45) saturate(0.3);
pointer-events: none;
}
.card.depth-2 {
z-index: 1;
transform: scale(0.88) translateY(28px);
filter: brightness(0.25) saturate(0.15);
pointer-events: none;
}

.card img {
width: 100%;
flex: 1;
min-height: 0;
object-fit: cover;
object-position: center center;
display: block;
pointer-events: none;
background: #1e293b !important;
transition: opacity 0.3s;
}
.card img.loading { opacity: 0.4; }

.card-info {
flex-shrink: 0;
padding: 11px 16px 13px;
background: linear-gradient(180deg, rgba(15,23,42,0) 0%, #0f172a 25%) !important;
}

.card-info h2 {
font-family: ‘Bebas Neue’, cursive;
font-size: clamp(1.25rem, 5.5vw, 1.6rem);
letter-spacing: 2px;
color: #f1f5f9 !important;
line-height: 1.1;
}

.card-tagline {
font-size: 0.72rem;
color: #64748b !important;
margin-top: 3px;
font-style: italic;
}

.card-emojis {
display: flex;
gap: 4px;
margin-top: 7px;
font-size: 1.05rem;
}

/* ── STAMPS ── */
.stamp {
position: absolute;
top: 22px;
font-family: ‘Bebas Neue’, cursive;
font-size: clamp(1.8rem, 7vw, 2.6rem);
letter-spacing: 3px;
border: 3px solid;
padding: 3px 12px;
border-radius: 8px;
opacity: 0;
pointer-events: none;
z-index: 10;
transition: opacity 0.07s;
}

.stamp-smash {
left: 14px;
color: #22c55e !important;
border-color: #22c55e;
transform: rotate(-12deg);
box-shadow: 0 0 16px rgba(34,197,94,0.5);
text-shadow: 0 2px 10px rgba(34,197,94,0.5);
background: transparent !important;
}

.stamp-pass {
right: 14px;
color: #ef4444 !important;
border-color: #ef4444;
transform: rotate(12deg);
box-shadow: 0 0 16px rgba(239,68,68,0.5);
text-shadow: 0 2px 10px rgba(239,68,68,0.5);
background: transparent !important;
}

/* ── DOTS ── */
.dots {
flex-shrink: 0;
display: flex;
gap: 5px;
flex-wrap: wrap;
justify-content: center;
max-width: 260px;
margin: 4px 0 2px;
background: transparent;
}

.dot {
width: 7px; height: 7px;
border-radius: 50%;
background: #1e293b !important;
border: 1px solid #334155;
transition: all 0.28s ease;
}

.dot.active  { width: 16px; border-radius: 4px; background: #3b82f6 !important; border-color: #3b82f6; box-shadow: 0 0 8px rgba(59,130,246,0.5); }
.dot.smashed { background: #22c55e !important; border-color: #22c55e; }
.dot.passed  { background: #ef4444 !important; border-color: #ef4444; }

/* ── HINT ── */
.hint {
flex-shrink: 0;
font-size: 0.6rem;
color: #334155 !important;
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 6px;
background: transparent;
}

/* ── BUTTONS ── */
.btn-row {
flex-shrink: 0;
display: flex;
align-items: center;
gap: 28px;
padding: 10px 0 18px;
background: transparent;
}

.btn {
width: 66px; height: 66px;
border-radius: 50%;
border: 2px solid;
font-size: 1.7rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: transform 0.12s, box-shadow 0.15s;
-webkit-tap-highlight-color: transparent;
}

.btn:active { transform: scale(0.82) !important; }

.btn-pass {
background: rgba(239,68,68,0.12) !important;
border-color: rgba(239,68,68,0.5);
color: #ef4444 !important;
box-shadow: 0 0 18px rgba(239,68,68,0.15);
}

.btn-smash {
background: rgba(34,197,94,0.12) !important;
border-color: rgba(34,197,94,0.5);
color: #22c55e !important;
box-shadow: 0 0 18px rgba(34,197,94,0.15);
}

/* ── ANIMATIONS ── */
@keyframes flyLeft  { to { transform: translateX(-130vw) rotate(-28deg) scale(0.75); opacity: 0; } }
@keyframes flyRight { to { transform: translateX(130vw)  rotate(28deg)  scale(0.75); opacity: 0; } }
@keyframes promoteTop {
from { transform: scale(0.94) translateY(14px); filter: brightness(0.45) saturate(0.3); }
to   { transform: scale(1) translateY(0);        filter: brightness(1) saturate(1); }
}
@keyframes promoteMid {
from { transform: scale(0.88) translateY(28px); filter: brightness(0.25) saturate(0.15); }
to   { transform: scale(0.94) translateY(14px);  filter: brightness(0.45) saturate(0.3); }
}

.fly-left    { animation: flyLeft    0.40s cubic-bezier(0.55,0,1,0.45) forwards; }
.fly-right   { animation: flyRight   0.40s cubic-bezier(0.55,0,1,0.45) forwards; }
.promote-top { animation: promoteTop 0.36s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.promote-mid { animation: promoteMid 0.36s cubic-bezier(0.34,1.2,0.64,1) forwards; }

/* ── DONE SCREEN ── */
.done-screen {
display: none;
flex-direction: column;
align-items: center;
text-align: center;
z-index: 10;
width: 100%;
flex: 1;
overflow-y: auto;
padding: 24px 0 20px;
background: transparent;
}

.done-title {
font-family: ‘Bebas Neue’, cursive;
font-size: clamp(2rem, 9vw, 3rem);
letter-spacing: 4px;
background: linear-gradient(135deg, #60a5fa, #a78bfa);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

.done-sub {
color: #475569 !important;
font-size: 0.8rem;
margin-top: 6px;
line-height: 1.4;
}

.result-grid {
display: flex;
flex-wrap: wrap;
gap: 7px;
justify-content: center;
margin-top: 18px;
max-width: 360px;
padding: 0 12px;
}

.chip {
padding: 5px 13px;
border-radius: 50px;
font-size: 0.73rem;
font-weight: 600;
border: 1px solid;
}

.chip-smash { background: rgba(34,197,94,0.12) !important; border-color: rgba(34,197,94,0.4); color: #22c55e !important; }
.chip-pass  { background: rgba(239,68,68,0.12)  !important; border-color: rgba(239,68,68,0.4);  color: #ef4444 !important; }

.btn-restart {
margin-top: 24px;
padding: 13px 36px;
border-radius: 50px;
background: linear-gradient(135deg, #3b82f6, #6366f1) !important;
border: none;
color: #ffffff !important;
font-family: ‘Bebas Neue’, cursive;
font-size: 1.1rem;
letter-spacing: 2px;
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s;
box-shadow: 0 0 28px rgba(59,130,246,0.4);
}
</style>

</head>
<body>

<div class="app">

  <header>
    <div class="logo">🇮🇹 Brainrot Amore 🇮🇹</div>
    <div class="sub">Smash or Pass — Italian Brainrot Edition</div>
  </header>

  <div class="score-row">
    <div class="score-pill s">💚 SMASH <span id="smash-n">0</span></div>
    <div class="score-pill p">💀 PASS <span id="pass-n">0</span></div>
  </div>

  <div class="stack-wrap" id="stack-wrap">
    <div class="stack" id="stack"></div>
  </div>

  <div class="dots" id="dots"></div>
  <div class="hint">← swipe left to pass &nbsp;|&nbsp; swipe right to smash →</div>

  <div class="btn-row" id="btn-row">
    <button class="btn btn-pass"  onclick="vote('pass')"  aria-label="Pass">💀</button>
    <button class="btn btn-smash" onclick="vote('smash')" aria-label="Smash">💚</button>
  </div>

  <div class="done-screen" id="done">
    <div class="done-title">Finito! 🎉</div>
    <div class="done-sub">You've judged every creature<br>of the Brainrot universe.</div>
    <div class="result-grid" id="result-grid"></div>
    <button class="btn-restart" onclick="restart()">🔄 Gioca di Nuovo</button>
  </div>

</div>

<script>
const BASE = 'https://static.animalbrainrot.com/images/';
const creatures = [
  { name:'Tralalero Tralala',     tagline:'Shark in Nikes — chaos at every step',               emojis:['🦈','👟','🎵'], img:BASE+'Tralalero%20Tralala.webp' },
  { name:'Bombardiro Crocodillo', tagline:'Flying alligator of absolute destruction',            emojis:['✈️','🐊','💣'], img:BASE+'Bombardino%20Crocodillo.webp' },
  { name:'Tung Tung Tung Sahur',  tagline:'Terrifying anomaly that only appears at dawn',        emojis:['🥁','🌙','😤'], img:BASE+'Tung%20Tung%20Tung%20Sahur.webp' },
  { name:'Brr Brr Patapim',       tagline:'Forest being with tangled roots & arcane accent',    emojis:['🌿','🦧','🗣️'], img:BASE+'Brr%20Brr%20Patapim.webp' },
  { name:'Lirili Larila',         tagline:'Cactus elephant wandering deserts in sandals',        emojis:['🌵','🐘','🩴'], img:BASE+'Lirili%20Larila.webp' },
  { name:'Bombombini Gusini',     tagline:'Goose bomber — adopted brother of Bombardiro',        emojis:['🦢','💥','🕊️'], img:BASE+'Bombombini%20Gusini.webp' },
  { name:'Ballerina Capuchina',   tagline:'Graceful wife of Cappuccino Assassino',               emojis:['🩰','☕','💃'], img:BASE+'Ballerina%20Capuchina.webp' },
  { name:'Glorbo Fruttodrillo',   tagline:'Watermelon-croc ruler of the swamps',                emojis:['🍉','🐊','🌺'], img:BASE+'Glorbo%20Fruttodrillo.webp' },
  { name:'Boneca Ambalabu',       tagline:'Frog-tyre hybrid of the Brazilian forests',           emojis:['🐸','🔄','🌳'], img:BASE+'Boneca%20Ambalabu.webp' },
  { name:'Chimpanzini Bananini',  tagline:'Wa wa wa — banana monkey chaos energy',               emojis:['🐒','🍌','🎵'], img:BASE+'Chimpanzini%20Bananini.webp' },
];

let deck=[], results=[], smashCount=0, passCount=0;
let dragging=false, startX=0, curX=0, topEl=null;

function init() {
  deck=[...creatures]; results=[]; smashCount=passCount=0;
  document.getElementById('smash-n').textContent=0;
  document.getElementById('pass-n').textContent=0;
  buildDots(); buildStack();
}

function buildDots() {
  const w=document.getElementById('dots'); w.innerHTML='';
  deck.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.id='dot'+i; w.appendChild(d);
  });
}

function buildStack() {
  const stack=document.getElementById('stack'); stack.innerHTML=''; topEl=null;
  const count=Math.min(3,deck.length);
  for(let depth=count-1;depth>=0;depth--){
    const card=makeCard(deck[depth],depth);
    stack.appendChild(card);
    if(depth===0){topEl=card;}
  }
  if(topEl) bindDrag(topEl);
}

function makeCard(c,depth){
  const card=document.createElement('div');
  card.className='card depth-'+depth;
  card.dataset.depth=depth;

  const img=document.createElement('img');
  img.src=c.img; img.alt=c.name; img.classList.add('loading');
  img.onload=()=>img.classList.remove('loading');
  img.onerror=()=>{img.style.cssText='background:#1e293b!important;min-height:200px;';img.classList.remove('loading');};

  const info=document.createElement('div');
  info.className='card-info';
  info.innerHTML=`<h2>${c.name}</h2><div class="card-tagline">${c.tagline}</div><div class="card-emojis">${c.emojis.map(e=>`<span>${e}</span>`).join('')}</div>`;

  const ss=document.createElement('div'); ss.className='stamp stamp-smash'; ss.textContent='SMASH';
  const sp=document.createElement('div'); sp.className='stamp stamp-pass';  sp.textContent='PASS';

  card.appendChild(img); card.appendChild(info); card.appendChild(ss); card.appendChild(sp);
  return card;
}

function bindDrag(card){
  card.addEventListener('mousedown', onStart);
  card.addEventListener('touchstart', onStart, {passive:true});
}

function onStart(e){
  if(dragging)return; dragging=true;
  const pt=e.touches?e.touches[0]:e;
  startX=pt.clientX; curX=0;
  topEl.style.transition='none';
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onEnd);
  document.addEventListener('touchmove', onMove, {passive:true});
  document.addEventListener('touchend',  onEnd);
}

function onMove(e){
  if(!dragging)return;
  const pt=e.touches?e.touches[0]:e;
  curX=pt.clientX-startX;
  topEl.style.transform=`translateX(${curX}px) rotate(${curX*0.07}deg)`;
  const ratio=Math.min(Math.abs(curX)/90,1);
  const ss=topEl.querySelector('.stamp-smash');
  const sp=topEl.querySelector('.stamp-pass');
  if(curX>15){ss.style.opacity=ratio;sp.style.opacity=0;}
  else if(curX<-15){sp.style.opacity=ratio;ss.style.opacity=0;}
  else{ss.style.opacity=0;sp.style.opacity=0;}
}

function onEnd(){
  if(!dragging)return; dragging=false;
  document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onEnd);
  document.removeEventListener('touchmove',onMove); document.removeEventListener('touchend',onEnd);
  if(curX>80) vote('smash');
  else if(curX<-80) vote('pass');
  else{
    topEl.style.transition='transform 0.38s cubic-bezier(0.175,0.885,0.32,1.275)';
    topEl.style.transform='';
    topEl.querySelector('.stamp-smash').style.opacity=0;
    topEl.querySelector('.stamp-pass').style.opacity=0;
  }
}

function vote(type){
  if(!deck.length||!topEl)return;
  const card=topEl;
  card.querySelector('.stamp-'+(type==='smash'?'smash':'pass')).style.opacity=1;
  card.querySelector('.stamp-'+(type==='smash'?'pass':'smash')).style.opacity=0;
  card.style.transition='none'; card.style.pointerEvents='none';
  card.classList.add(type==='smash'?'fly-right':'fly-left');
  const gone=deck.shift(); results.push({creature:gone,type});
  if(type==='smash'){smashCount++;document.getElementById('smash-n').textContent=smashCount;}
  else{passCount++;document.getElementById('pass-n').textContent=passCount;}
  const idx=results.length-1;
  const dot=document.getElementById('dot'+idx);
  if(dot){dot.classList.remove('active');dot.classList.add(type==='smash'?'smashed':'passed');}
  const next=document.getElementById('dot'+(idx+1));
  if(next)next.classList.add('active');

  card.addEventListener('animationend',()=>{
    card.remove();
    if(!deck.length){showDone();return;}
    const stack=document.getElementById('stack');
    const d1=stack.querySelector('.depth-1');
    if(d1){
      d1.classList.remove('depth-1'); d1.dataset.depth=0;
      d1.classList.add('depth-0','promote-top');
      d1.style.pointerEvents='';
      d1.addEventListener('animationend',()=>d1.classList.remove('promote-top'),{once:true});
      topEl=d1; bindDrag(d1);
    }
    const d2=stack.querySelector('.depth-2');
    if(d2){
      d2.classList.remove('depth-2'); d2.dataset.depth=1;
      d2.classList.add('depth-1','promote-mid');
      d2.addEventListener('animationend',()=>d2.classList.remove('promote-mid'),{once:true});
    }
    if(deck.length>=3){
      const nc=makeCard(deck[2],2);
      stack.insertBefore(nc,stack.firstChild);
    }
  },{once:true});
}

function showDone(){
  ['stack-wrap','dots','btn-row'].forEach(id=>document.getElementById(id).style.display='none');
  document.querySelector('.hint').style.display='none';
  const done=document.getElementById('done'); done.style.display='flex';
  const grid=document.getElementById('result-grid'); grid.innerHTML='';
  results.forEach(({creature,type})=>{
    const chip=document.createElement('div');
    chip.className='chip chip-'+type;
    chip.textContent=(type==='smash'?'💚 ':'💀 ')+creature.name;
    grid.appendChild(chip);
  });
}

function restart(){
  ['stack-wrap','dots','btn-row'].forEach(id=>document.getElementById(id).style.display='');
  document.querySelector('.hint').style.display='';
  document.getElementById('done').style.display='none';
  init();
}

init();
</script>

</body>
</html>
